# Overmind Service Catalog
# BOMAPP 마이크로서비스 메타데이터 정의 (보험 상품 도메인)
# Leader가 영향 분석 및 작업 계획 수립에 사용
#
# 필드 참고:
#   docs_to_read (optional, list[str])
#     - Teammate이 worktree 진입 직후 반드시 읽어야 할 추가 문서 경로 (worktree 루트 기준 상대경로).
#     - 해당 서비스의 work에 항상 적용되는 도메인 규칙·운영 절차 문서를 나열한다.
#     - `CLAUDE.md` / `AGENTS.md` 는 절대 규칙으로 자동 선독되므로 명시하지 않아도 되지만,
#       방어적으로 중복 명시해도 무방하다 (Teammate 보고서에 인용되어 누락 적발이 쉬워짐).
#     - 상황별 runbook(예: 인증서 갱신)은 여기에 넣지 말고, 해당 작업이 트리거됐을 때
#       Leader가 Teammate 프롬프트에 추가로 전달한다.

services:
  # ─────────────────────────────────────────────
  # Shared Infrastructure
  # ─────────────────────────────────────────────
  - name: "infra"
    repo_url: "github.com/bomapp-inc/infra"
    path: "../infra"
    feature_base_branch: "main"
    description: "BOMAPP AWS 인프라 IaC. Terraform으로 ECS 클러스터, RDS, ElastiCache, ALB, MSK 등을 관리하며 next-backend의 9개 ECS 서비스를 배포한다."
    tech_stack: ["terraform", "aws", "ecs", "rds", "elasticache", "alb", "msk"]
    critical_paths:
      - path: "terraform"
        description: "Terraform root module. provider/variables/main(module 블록) + cross-cutting 리소스(env-spanning for_each ECS·IAM, cross-env SG rule, CI/CD IAM, cross-cutting route53). 로컬 state. (MR !36 환경별 모듈 구조 — 머지+적용 완료 2026-06-11; state mv 566건 후 moved_*.tf 제거, -target 점진 apply shared/dev/stg/prod 완료)"
      - path: "terraform/modules/shared"
        description: "전역+네트워킹 모듈: VPC/subnet, ECR, ACM, IAM 전역, OIDC, route53 zone, cloudwatch, ES 인덱스 템플릿. 무의존(acyclic 기준)."
      - path: "terraform/modules/prod"
        description: "PROD 환경 모듈: SG, LB, listener/rule, TG(LB 단위 파일 분리), elasticache, cluster, route53 records, S3/CF, IAM, secrets. shared 를 var 로 소비."
      - path: "terraform/modules/stg"
        description: "STG 환경 모듈 (PROD VPC 공유). 구성은 prod 모듈과 동형."
      - path: "terraform/modules/dev"
        description: "DEV 환경 모듈 (DEV VPC). 구성은 prod 모듈과 동형."
    docs_to_read:
      - "CLAUDE.md"   # Terraform 작업 규정 1~5번 (state 선독, destroy 금지, -target 점진 apply, prevent_destroy, AWS 실제 값 반영). 절대 규칙으로 이미 자동 선독되지만, 인프라 작업은 위반 시 영향이 커서 방어적으로 명시.
    dependencies: []
    test_command: "terraform validate"
    lint_command: "terraform fmt -check"
    notes:
      - "PROD 리소스는 prevent_destroy로 보호. destroy/replace 작업 절대 금지."
      - "변경 전 반드시 terraform state를 완전히 읽어 확인 후 plan/apply 수행."
      - "ECS 배포 대상 서비스: bomapp-api, chat-api, mydata-api, open-api, bomapp-batch, mydata-batch, statics-batch, wings-api"   # alimtalk-callback 디커미션됨 (BOM-180, 2026-06-16)"

  # ─────────────────────────────────────────────
  # Next-Generation Backend Platform
  # ─────────────────────────────────────────────
  - name: "next-backend"
    repo_url: "gitlab.bomapp.co.kr/bomapp/next-backend"   # 정본=GitLab(project id 40, group bomapp, default prod). 2026-06-16 정본 이전 — 작업은 GitLab MR(glab). github.com/bomapp-inc/next-backend 는 레거시 미러(PR 미사용).
    path: "../next-backend"
    feature_base_branch: "dev"   # prod=운영, dev=개발통합, feature/*는 dev에서 분기→dev로 MR. docs/git-branching-strategy.md 참조.
    description: "차세대 BOMAPP 백엔드 플랫폼. Gradle 멀티모듈로 5계층(core/internal/domain/external/server) 아키텍처를 구성하고, 9개 마이크로서비스 앱(API, 배치, 채팅, 마이데이터, 웹훅 등)을 단일 리포에서 빌드/배포한다. 보험 상품 조회/추천/판매의 핵심 도메인 로직 담당."
    tech_stack: ["java-21", "spring-boot-3.4", "spring-cloud-2024", "gradle-multi-module", "querydsl", "kafka-msk", "redisson", "jwt", "elastic-apm", "jib", "distroless"]
    critical_paths:
      - path: "bomapp-core/src/main/java"
        description: "공통 유틸리티 및 코어 라이브러리"
      - path: "bomapp-internal/src/main/java"
        description: "내부 프레임워크 (인증, 인가, 공통 인터셉터 등)"
      - path: "bomapp-domain/rds/src/main/java"
        description: "RDS 기반 도메인 모델 및 리포지토리"
      - path: "bomapp-domain/redis/src/main/java"
        description: "Redis 기반 도메인 모델 및 캐시"
      - path: "bomapp-external/src/main/java"
        description: "외부 시스템 연동 (14개 외부 클라이언트)"
      - path: "bomapp-server/bomapp-api"
        description: "메인 REST API 서버 (보험 상품 도메인)"
      - path: "bomapp-server/chat-api"
        description: "WebSocket 기반 상담 채팅 서버"
      - path: "bomapp-server/mydata-api"
        description: "마이데이터 통합 API (mydata-agent / mydata-mgmts-api 호출)"
      - path: "bomapp-server/mydata-batch"
        description: "마이데이터 일괄 수집 배치"
      - path: "bomapp-server/open-api"
        description: "외부 파트너 공개 API"
      - path: "bomapp-server/bomapp-batch"
        description: "BOMAPP 메인 배치"
      - path: "bomapp-server/statics-batch"
        description: "통계 집계 배치"
      - path: "bomapp-server/wings-api"
        description: "Wings(설계사 도구) API"
    dependencies:
      - service: "mydata-agent"
        type: "sync"
        interface: "rest"
        note: "mydata-api 가 외부 마이데이터 기관 통신을 위해 mydata-agent 게이트웨이를 호출"
      - service: "mydata-mgmts-api"
        type: "sync"
        interface: "rest"
        note: "(추정) 마이데이터 인증/동의 처리를 위해 mydata-mgmts-api(구 bomapp_my_data) 호출. 도메인 레이어에 레거시 인스턴스 정리 TODO 존재"
    test_command: "./gradlew test"
    lint_command: null
    notes:
      - "앱별 테스트 실행: ./gradlew :bomapp-server-{app}:test"
      - "환경별 프로파일 분리: local/dev/stg/prod. application-{profile}.yml 다중 사용."
      - "JUnit 5 사용 (useJUnitPlatform). checkstyle/ktlint 미설정."
      - "**CI 듀얼 운영(2026-06, 사내 GitLab 이전 진행 중)**: 기존 GitHub Actions(.github/workflows/build·build-and-deploy·ecs-deploy·pr-check) + 신규 GitLab CI(.gitlab-ci.yml)가 과도기 공존(양쪽 동일 Jib→ECR→ECS 동작). GitLab 측 제약: OIDC 불가→정적 AWS 키 CI/CD 변수, amazon/aws-cli entrypoint:[\"\"] 우회, AWS CLI v2 번들 설치, ECR 직접 push(대용량 artifact 미사용), ref_protected 러너(보호 브랜치/태그서만 실행). Claude 리뷰/봇 워크플로우(claude-code-review.yml·claude.yml)는 제거(양쪽 미운영). PR #462(base dev) — .gitlab-ci.yml 은 아직 PR 단계라 prod/dev 미반영, 머지 전엔 GitLab 파이프라인 미작동."
      - "**GitLab 미러 생성·가동 완료(2026-06-15)**: gitlab.bomapp.co.kr/bomapp/next-backend (project id 40, private, group bomapp id 21). 9브랜치+34태그 푸시(prod HEAD 6fe23970 일치), default=prod. 러너=인스턴스 공유러너 id=1(`bomapp-linux-runner`, Linux, run_untagged, **ref_protected**) — dev·prod 브랜치 + v* 태그 보호 완료. CI/CD 변수 AWS_ACCESS_KEY_ID/SECRET 등록 완료(사용자). **.gitlab-ci.yml 은 GitLab dev 에 머지됨(MR !1) — GitHub PR#462 와 무관(GitLab 전용)**. **파이프라인 검증 완료(2026-06-15)**: api 트리거(pipeline 502, PIPELINE_TARGET=pr-check)→ref_protected 러너 픽업→job success. **api 소스 영구 허용(MR !2)** — Claude/자동화가 dev·stg 빌드/배포를 GitLab API 로 트리거(잡은 when:manual 이라 생성 후 play 필요). **정본 이전 완료(2026-06-16)**: 로컬 origin/작업 정본이 GitLab(`gitlab.bomapp.co.kr/bomapp/next-backend`)으로 이전 — 이후 작업은 GitLab MR(`glab`)로 처리하고 GitHub `bomapp-inc/next-backend` 는 레거시 미러(PR 미사용). **미해결: GitHub Claude 워크플로우 제거(원요청)는 사용자 결정으로 '그대로 둠' 보류, PR#462 도 비긴급 보류.**"

  - name: "next-frontend"
    repo_url: "github.com/bomapp-inc/next-frontend"
    path: "../next-frontend"
    feature_base_branch: "main"
    description: "차세대 BOMAPP 프론트엔드 모노레포. Yarn workspaces로 6개 웹/모바일/데스크톱/어드민 앱을 함께 관리하며 Vue 3 + Vite + Tailwind 스택 사용. next-backend의 API들을 axios/TanStack Query로 호출."
    tech_stack: ["typescript-5.8", "vue-3.5", "vite-7", "tailwind-3.4", "yarn-workspaces", "pinia", "tanstack-query", "sockjs-stomp", "sentry", "amplitude"]
    critical_paths:
      - path: "shared"
        description: "공유 컴포넌트, 유틸, 타입"
      - path: "bomapp-web/src"
        description: "BOMAPP 메인 웹 (보험 상품 검색/조회/가입)"
      - path: "open-web/src"
        description: "공개 파트너 웹"
      - path: "nextjs-bds-web/src"
        description: "BDS 웹 (브랜드 디자인 시스템 또는 비즈니스 데이터 서비스)"
      - path: "planner-mobile/src"
        description: "재정설계 모바일 앱"
      - path: "planner-desktop/src"
        description: "재정설계 데스크톱 앱"
      - path: "planner-admin/src"
        description: "재정설계 어드민"
    dependencies:
      - service: "next-backend"
        type: "sync"
        interface: "rest"
        note: "bomapp-api / mydata-api / open-api / chat-api 호출. 환경별 .env.{dev,stg,prod} 로 API URL 분기"
    test_command: null
    lint_command: null
    notes:
      - "package.json 에 test/lint 스크립트가 정의되어 있지 않다. 변경 시 빌드(`yarn build`)로만 1차 검증 가능."
      - "각 앱별 환경 파일은 .env.dev / .env.stg / .env.prod 패턴."

  # ─────────────────────────────────────────────
  # MyData Layer (마이데이터 연동)
  # ─────────────────────────────────────────────
  - name: "mydata-agent"
    repo_url: "github.com/bomapp-inc/mydata-agent"
    path: "../mydata-agent"
    feature_base_branch: "prod"
    description: "마이데이터 게이트웨이. 외부 마이데이터 기관과의 SSL 통신을 담당하며 next-backend의 mydata-api로부터 호출되어 보험 상품 데이터를 수집/조회한다. WebFlux 기반 비동기 처리."
    tech_stack: ["java-17", "spring-boot-3.0", "spring-webflux", "gradle"]
    critical_paths:
      - path: "src/main/java/kr/co/mydata_agent"
        description: "에이전트 애플리케이션 진입점 및 핵심 로직"
      - path: "src/main/java/kr/co/mydata_agent/gateway"
        description: "마이데이터 기관 통신 게이트웨이 (SSL 인증서 기반)"
      - path: "src/main/resources"
        description: "application.yml 및 SSL keystore 경로 설정"
    dependencies: []
    test_command: "./gradlew test"
    lint_command: null
    notes:
      - "포트: stg=8008. 기본/prod 포트는 application.yml 에서 환경별로 확인 필요."
      - "SSL 키스토어 (jks) 경로가 설정에 하드코딩되어 있어 배포 환경마다 차이 주의."
      - "단일 application.yml 에 모든 환경 프로파일이 포함되어 있다."

  - name: "mydata-mgmts-api"   # 구 이름 bomapp_my_data (BOM-121 리네임, 2026-06)
    repo_url: "github.com/bomapp-inc/mydata-mgmts-api"
    path: "../mydata-mgmts-api"
    feature_base_branch: "master"
    description: "금융 마이데이터 표준 '동의·관리(mgmts)' 수신 API 서버. 보맵이 마이데이터사업자(정보수신자)로서 `auth.bomapp.co.kr` 도메인에 노출하며, 종합포털(api.mydatacenter.or.kr)이 `POST /v2/mgmts/consents`·`/v2/mgmts/agreements` 등 표준 API를 호출한다. 마이데이터 OAuth 토큰 발급(RS512 자체 구현)·동의정보 관리를 표준 스펙대로 구현. 일부 경로는 next-backend/mydata-api 로 위임. DigiCert EV 인증서(prod-alb:5443 구간)에 묶인 표준 수신면 = 규제필수. (구 이름 bomapp_my_data / 패키지 kr.co.bomapp.auth.bomappmydata — BOM-121 에서 mydata-mgmts-api / kr.co.bomapp.mydata.mgmts 로 리네임. 이름 비슷한 폐기 jar `bomapp_oauth`(8888)와는 무관.)"
    tech_stack: ["java-21", "spring-boot-3.4", "spring-cloud-2024", "spring-cloud-openfeign", "jpa", "redis", "thymeleaf", "jjwt-0.12", "maven", "docker"]
    critical_paths:
      - path: "src/main/java/kr/co/bomapp/mydata/mgmts/controllers"
        description: "표준 mgmts 수신 컨트롤러 — ManagementController(`/v2/mgmts/consents`), AgreementController(`/v2/mgmts/agreements*`), ConsentController(`/v2/mgmts/consents/revoke`). auth.bomapp.co.kr 실 트래픽 핸들러. (BOM-116 에서 deprecated v1·OpenApiController 제거.)"
      - path: "src/main/java/kr/co/bomapp/mydata/mgmts/services"
        description: "ManagementService.issueOAuthToken / JwtService(RS512) 등 — 마이데이터 OAuth 토큰발급·JWT 자체 구현. (BOM-116 에서 'servicese' 오타→'services' 리네임 + clientSecret 마스킹.)"
      - path: "src/main/java/kr/co/bomapp/mydata/mgmts/client/NextMyDataApiClient.java"
        description: "next-backend/mydata-api 로 일부 mgmts 경로 위임(OpenFeign). (url=stg-int-mapi:8080 하드코딩.)"
      - path: "src/main/resources"
        description: "application-{dev,stg,prod}.properties. 신규 ECS 배포는 server.port=8080(전 환경). 구 PROD jar 는 11000/15000. my-data.management.org-url=api.mydatacenter.or.kr:7443, spring.data.redis.host=10.10.10.71."
      - path: "ops/ecs/ , Dockerfile , .github/workflows/"
        description: "BOM-114 컨테이너화 산출물 — Dockerfile(temurin-21 멀티스테이지, ARM64), ops/ecs/mydata-mgmts-api/overlays/{dev,stg,prod}(prod CPU_RESERVATION soft·DESIRED 2), GH Actions(build→ECR→ECS). ✅ 2026-06-11 PROD 5443 100% 컷오버 완료. ALB 룰은 aws-cli 변경분 → TF 반영 필요(-target). 현재 가동: 빌드 20260615-724a5d0, taskDef:8(2026-06-15 HikariCP/healthy-log fix 배포). ⚠️ build-and-deploy.yml 은 환경마다 재빌드하는데 이미지 태그가 날짜-shortSHA(환경 무관 동일)+ECR immutable → 2번째 환경부터 TAG_INVALID 충돌. 다환경 순차 배포 시 build 1회 후 ecs-deploy.yml(image-tag 재사용)로 stg/prod 배포할 것."
    dependencies:
      - service: "mydatacenter.or.kr (마이데이터 종합포털/지원기관)"
        type: "sync"
        interface: "rest"
        note: "상위 표준 지원 API (`my-data.management.org-url`, prod=`api.mydatacenter.or.kr:7443`). 외부 규제 기관."
      - service: "next-backend/mydata-api"
        type: "sync"
        interface: "rest"
        note: "NextMyDataApiClient(OpenFeign)로 일부 `/v2/mgmts/*` 위임. (BomappApiClient 의 `bomapp.api.url` prod 빈 값 = /single-authorization 경로 별개.)"
    docs_to_read:
      - "README.md"
      - "docs/ARCHITECTURE.md"
    test_command: "mvn test"   # 로컬 JDK 없음 → docker maven:3.9-eclipse-temurin-21 권장. 현재 4통과/1스킵(SlackApiClientTest@Disabled, 실 웹훅).
    lint_command: null
    notes:
      - "**리네임(BOM-121, 2026-06)**: repo `bomapp_my_data`→`mydata-mgmts-api`, 패키지 `kr.co.bomapp.auth.bomappmydata`→`kr.co.bomapp.mydata.mgmts`, artifact `bomappmydata`→`mydata-mgmts-api`(jar 명도). GitHub 구 URL 리디렉션. (APM `application_packages` 루트는 여전히 `kr.co.bomapp`.)"
      - "**현대화 완료(코드, BOM-113)**: SB 2.3→3.4.5 / Java 11→21 / jjwt 0.11→0.12(RS512 토큰 바이트 동등 검증) / javax→jakarta / 죽은코드·보안(clientSecret 마스킹) 정리. **✅ 2026-06-11 PROD 신규 ECS 배포·컷오버 완료**(빌드 20260611-9e0b726). 아래 '런타임 라우팅'의 구 jar 기술은 2026-06-04 시점 스냅샷."
      - "**런타임 라우팅(✅ 2026-06-11 컷오버 후)**: auth.bomapp.co.kr → prod-nlb:5443 → prod-alb:5443 **prio-100 host룰** → TG `prod-mydata-mgmts-api-ip-8080` → ECS PROD-Cluster/SVC-ECS-PROD-mydata-mgmts-api(빌드 20260615-724a5d0, 8080, taskDef:8, 2태스크; 2026-06-11 컷오버 시점은 20260611-9e0b726/taskDef:7). 구 11000(`bomappmydata-0.0.1-SNAPSHOT.jar`, i-03f0178089f760c6f:11000)은 weight0 + :5443 default 롤백 stub. 상세: docs/runtime-verification.md §10 · docs/services/mydata-mgmts-api.md §2.1."
      - "**규제필수 (decommission 주의)**: 표준 mgmts 수신면 = EV 인증서(5443) 구간. ✅ 2026-06-11 신규 ECS 100% 컷오버 완료(weighted 25→50→100% + 핀 검증 + agreements NPE fix PR#18). 구 PROD-BACK 11000 jar 는 롤백 stub(장기 무트래픽 확인 후 제거). ~150 req/일. **임의 중단 금지.** 남은 정리: ALB 룰 TF 반영(-target)."
