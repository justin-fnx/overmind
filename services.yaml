  # ─────────────────────────────────────────────
  - name: "az-was"
    repo_url: "gitlab.bomapp.co.kr/bomapp/az-was"   # 정본은 GitLab. github.com/bomapp-inc/az-was 는 카카오페이 모듈이 빠진 구버전 미러 — 사용 금지.
    path: "../az-was"
    feature_base_branch: "main"   # origin/HEAD=main. develop/staging/main 이 현재 동일 커밋(5049413)이나 최신 머지가 'into staging' 이라 통합 브랜치가 staging 일 가능성 — 팀 확인 필요(미확정). CI(Jenkins)는 브랜치-환경 자동매핑 없이 수동 파라미터로 배포.
    description: "에즈금융서비스(AZ) 측 WAS = **카카오페이 보험상담 연동 허브 + 추가정보(설문) 수집** 서버. Spring Boot 3.2.5/Java 21, 헥사고날(com.az.kakaopay.consultation.*) + 레거시 설문(com.az.az_was.*). 흐름: 에즈브릿지 웹뷰→az-was→카카오페이(상담 PII pull)→보맵 chat-api(상담 신청/만료 통보). 보맵은 az-was 의 /api/v1/kakaopay-members* 로 회원 PII 를 역조회. 도메인 az.bomapp.co.kr. 카카오페이 회원 PII 의 실제 저장소(마스킹+SHA512해시+KMS봉투암호화)."
    tech_stack: ["java-21", "spring-boot-3.2.5", "spring-cloud-2023", "openfeign", "spring-data-jpa", "mysql", "jjwt-0.12.3", "aws-kms-sdk-v1", "micrometer-tracing", "springdoc-openapi", "spring-dotenv"]
    critical_paths:
      - path: "src/main/java/com/az/kakaopay/consultation"
        description: "카카오페이 상담 헥사고날 모듈 (presentation/application/domain/infrastructure)."
      - path: "src/main/java/com/az/kakaopay/consultation/infrastructure/external/kakao"
        description: "az-was→카카오페이 Feign (POST /api/v2/consults/{uuid} 상담PII, /api/v1/consults/canceled 취소polling). 인증 Authorization: PARTNER_KEY. KakaoPayKmsDecryptor 는 dead code."
      - path: "src/main/java/com/az/kakaopay/consultation/infrastructure/external/planner"
        description: "az-was→보맵 chat-api Feign (POST/PUT {chat.url}/external/consultations/kakaopay 상담 신청/만료). ⚠ KakaoPayFeignConfig 재사용으로 PARTNER_KEY 헤더 오부착 [Critical]."
      - path: "src/main/java/com/az/kakaopay/consultation/presentation/controller/MemberController.java"
        description: "보맵→az-was 인바운드 /api/v1/kakaopay-members* (평문 PII 반환). 무인증."
      - path: "src/main/java/com/az/kakaopay/consultation/application/scheduler"
        description: "ConsultationExpireScheduler — 카카오 취소 1분 polling + 제3자동의 만기 02:00 cron → 보맵 PUT 통보."
      - path: "src/main/java/com/az/az_was/tenant"
        description: "Customer-Type 헤더 기반 멀티테넌시. CustomerTableStatementInspector 가 단일 DB 내에서 user_response→kakaopay_user_response 식 테이블명 치환(크로스-DB 아님)."
      - path: "src/main/java/com/az/az_was/external/planner"
        description: "az-was→보맵 설문 상태 콜백 (POST /external/additional-info/status-changes, x-client-id=az-server / x-api-key)."
      - path: "src/main/resources/application.yml"
        description: "전 환경 설정 기준 (datasource 단일, external.chat.url/kakaopay.url/PARTNER_KEY, KMS, JWT 3종)."
    dependencies:
      - service: "kakaopay (외부)"
        type: "sync"
        interface: "rest"
        note: "az-was→카카오페이 pull. POST {kakaopay.url}/api/v2/consults/{uuid}, /api/v1/consults/canceled. 인증 Authorization: PARTNER_KEY ${KAKAOPAY_PARTNER_KEY}. 카카오는 az-was 로 push 안 함(polling 구조)."
      - service: "next-backend"
        type: "sync"
        interface: "rest"
        note: "양방향 HTTP. az-was→보맵: POST/PUT {chat.url}/external/consultations/kakaopay(상담 신청/만료), POST /external/additional-info/status-changes(설문상태). 보맵→az-was: GET /api/v1/kakaopay-members*(회원 PII 조회, bomapp-external/az-managed), DELETE /consultations/{uuid}, /api/v1/planners/surveys*(설문, Planner/Survey JWT). ※DB 직접 공유는 양측 앱 코드에 없음 — 전부 HTTP."
    test_command: "./gradlew test"
    lint_command: null
    notes:
      - "**정본=GitLab.** github.com/bomapp-inc/az-was 는 카카오페이 모듈(com.az.kakaopay.*)이 누락된 구버전 미러 — 분석/작업 금지."
      - "**공유-DB 결론**: az-was datasource 는 단일(자기 AZ DB). 보맵 DB 로의 2nd datasource·스키마·catalog 전무. next-backend 도 AZ DB 접근 코드 없음(2nd datasource·AZ 테이블·az_db 스키마 0건). → **보맵↔az-was 는 앱 코드 기준 100% HTTP(Feign).** 'DB 가운데 두고 교환'이 운영상 실재한다면 인프라/DBA 레벨(같은 Aurora + 스키마 GRANT/ETL)이며 코드로는 미확인 — SSM/DBA 확인 필요."
      - "**멀티테넌시**: Customer-Type 헤더(기본 BOMAPP / KAKAOPAY) → Hibernate StatementInspector 가 user_response·user_response_group·user_response_group_history·user_consent·survey_tokens 를 kakaopay_* 로 치환. **DB 분리가 아니라 같은 DB 내 테이블 분리.** 마스터(survey/question 등)는 미치환 공유."
      - "**PII 저장**(KakaoPayMember, @Table kakaopay_member): 이름/전화=마스킹+SHA512해시(앞30자, 검색용)+KMS봉투암호화(BME1=AES/GCM) 3형태. 생년월일(birth_sun/sang)=평문 varchar8. 성별=평문. 주민/CI/DI 컬럼 없음(미저장). 카카오 응답은 평문 수신→az 자체 BME1 암호화 저장. @Convert 미사용(서비스계층 수동 암복호)."
      - "[Critical] PlannerFeignClient 가 KakaoPayFeignConfig 재사용 → 보맵 호출에 x-client-id/x-api-key 대신 카카오용 Authorization: PARTNER_KEY 오부착. external.chat.client-id/api-key 미사용."
      - "[High] /api/v1/kakaopay-members*(평문 PII)·/consultations/*·/api/v1/test/* 무인증. JWT 인터셉터는 /api/v1/surveys, /api/v1/planners 에만 적용. CORS '*'+allowCredentials. Feign Logger.Level.FULL → PII·PARTNER_KEY·x-api-key 평문 로깅. error.include-stacktrace/message=always + prod swagger 노출. KakaoPayKmsDecryptor(RSAES_OAEP)=dead code."
      - "포트 8080(yml 미지정). 운영: EC2 직접배포(Jenkins 파라미터 dev/stg/prod, Docker/ECS·.gitlab-ci.yml 없음). PROD 2대(10.1.13.11/10.1.14.11) ALB(TG-AZ-http-8080,계정 044488971141) drain+deregister 무중단(POST /internal/drain + graceful 120s). STG 10.1.13.10 / DEV 10.90.110.10. ※인프라 리포엔 ECS az-was-batch 흔적 있으나 본 리포엔 ECS 컴포넌트 없음(인앱 스케줄러)."
      - "DB: 단일 MySQL Aurora, 접속정보 전부 env. ddl-auto=update + show-sql=true. insert_all.sh 에 dev DB 평문 비밀번호 하드코딩 [보안]. application-dev/stg.yml 은 .gitignore(개발팀 제공)."
      - "로그: 로컬 파일(logs/az-was*.log) + stdout, Micrometer traceId. ES/Fluent Bit 직접연동 없음. 마스킹 미적용. CLAUDE.md/AGENTS.md 없음, lint 미설정."

  # ─────────────────────────────────────────────
  # Standalone Security Component
  # ─────────────────────────────────────────────
  - name: "bomapp-vkey"
    repo_url: "github.com/bomapp-inc/bomapp-vkey"
    path: "../bomapp-vkey"
    feature_base_branch: "master"
    description: "라온시큐어 TouchEn 가상키보드(transkey) 서버측 복호화 서버. 신용정보원 회원가입/비번재설정 주민번호, 연동(자동차·진료·건강검진·공인인증서) 인증서 비번 및 주민번호, 청구 주민번호, 마켓 카드번호 등 민감 정보 입력 플로우에서 클라이언트 가상키보드 페이로드를 복호화한다. `vkey.bomapp.co.kr` 도메인으로 노출. 벤더 1차 컨택: 장지수(라온 Technical Support Team II, jsjang@raoncorp.com, 2021 기록)."
    tech_stack: ["java-17", "spring-boot-2.7", "embedded-tomcat-9", "gradle", "jib", "raonsecure-transkey-4.6", "raonsecure-transkey-decrypt-etoe-1.5"]
    critical_paths:
      - path: "src/main/java/kr/co/bomapp/securekey/controller/TranskeyDecodeController.java"
        description: "bapi 의 `POST /transkeyServlet/decode` 호출을 처리하는 controller. `TransKey.withoutSessionDecode(prefix, request)` 1단계 stateless decode. BV-7 fix 의 핵심."
      - path: "src/main/java/kr/co/bomapp/securekey/config/ServletRegistrationConfig.java"
        description: "Raon `TranskeyServlet` 등록. URL pattern: `/transkeyServlet`, `/secure_servlet/transkeyServlet` (exact only). `/transkeyServlet/*` prefix 는 controller 우선순위 위해 등록 X."
      - path: "src/main/java/kr/co/bomapp/securekey/SecureKeyApplication.java"
        description: "Spring Boot main. `extractLicenseFromEnvIfConfigured()` 가 ECS env `RAON_LICENSE_ZIP_BASE64` (SM 주입) → webapp `transkey__P_license/` 에 unzip."
      - path: "src/main/webapp/WEB-INF/raon_config/config.ini"
        description: "Raon 라이브러리 설정 (세션, 키보드 종류 경로 등). `useSession=false`, `useCORS=false` (Spring `CorsConfig` 가 CORS 처리)."
      - path: "src/main/resources/lib"
        description: "라온 라이브러리 jar (`transkey-4-6-12_18_20190703_X.jar`, `TranskeyDecryptEtoE1.5_14.jar`). 옛 transkey_servlet 의 jar 와 SHA 동일."
      - path: "ops/ecs/bomapp-vkey/overlays/{dev,stg,prod}/.env"
        description: "환경별 ECS overlay — cluster/service/secret arn 등. CI 의 envsubst 가 task-definition.json 에 주입."
      - path: ".github/workflows/build-and-deploy.yml"
        description: "workflow_dispatch only. build-and-test → build-and-push (Jib + ECR direct push, IMMUTABLE tag 충돌 skip 로직 포함) → deploy (ECS register/update/wait)."
    dependencies: []
    test_command: "./gradlew test"
    lint_command: null
    notes:
      - "**현재 운영 형태 (2026-06-08 cutover 완료)**: ECS `PROD-Cluster` / service `SVC-ECS-PROD-bomapp-vkey`, EC2 launch type (m7g Graviton 3, arm64), desired=2 multi-AZ. ALB priority 10 가 단일 TG `prod-bomapp-vkey-ip-8080` 처리 (옛 8080 leg 는 BOM-83 디커미션으로 제거). priority 4 (X-Canary=office 헤더 룰) 도 동일 TG — 헤더 검증 기반이라 재사용 위해 유지. priority 5 (사무실 source-ip 룰) 은 MR !43 으로 제거(컷오버 완료, redundant)."
      - "**BV 마이그레이션 (2026-05-19 ~ 2026-06-08)**: 옛 PROD-BACK 공용 WAS 컨테이너 (`next-backend-was:1.1`, `i-03f0178089f760c6f` 내부 PID 1205, Tomcat 9.0.45 WAR) → 독립 Spring Boot ECS service. BV-1 부활, BV-2 동등성 검증, BV-3 Dockerfile/Jib, BV-4 IAM/ECR/SM 프로비저닝, BV-5 GitHub Actions, BV-6 STG, BV-7 PROD cutover + silent decode fail fix (PR #13)."
      - "**BV-7 silent decode fail 회고**: 옛 운영의 decode 처리가 `TranskeyServlet.service()` 가 아닌 별도 controller (next-backend-was image 안에 존재, 정확한 source repo 미확정) 였는데 새 image 가 그 controller 누락 → bapi 호출이 그냥 servlet 으로 가서 SDK 가 op=\"decode\" 분기 진입 전 silent return. `TranskeyDecodeController` + `TransKey.withoutSessionDecode` 1단계로 해결. 자세히 [infra runbook](../../../infra/docs/runbooks/bv-7-silent-decode-failure.md)."
      - "**운영 라이선스 (2026-05-19 SSM 추출 + 2026-05-26 SM 이관)**: `transkey_license.ini` 의 `license.type=p` 활성. P 라이선스 X.509 Subject = `O=bomapp, CN=T=P&D=[*.bomapp.co.kr]`, 유효 2019-08-19 ~ **2049-08-11 (30년 영구)**. AWS Secrets Manager `bomapp/{dev,stg,prod}/raon_license` 에 SecretString (base64 zip) 으로 저장 → ECS env `RAON_LICENSE_ZIP_BASE64` 로 주입."
      - "**옛 PoC repo**: [`bomapp-inc/transkey_servlet`](https://github.com/bomapp-inc/transkey_servlet) — DEPRECATED. README 에 명시. BV-7 진단의 결정적 단서 (옛 jar SHA 비교, decoder_sample.jsp 패턴) 가치만 보존."
      - "**비표준 위치**: GitLab 셀프호스트(`gitlab.bomapp.co.kr`) 가 아닌 GitHub `bomapp-inc` 조직에 위치. BOMAPP 의 다른 서비스 호스팅 컨벤션 예외. CI: GitHub Actions OIDC + IAM Role `github-actions-bomapp-vkey-role` (trust condition: `repo:bomapp-inc/bomapp-vkey:*`)."
      - "**bapi 측 호출**: `next-backend` 의 `bomapp-external/raon/SecureServletExternalClient` 가 Feign `@PostMapping(\"/transkeyServlet/decode\")` 로 호출. 사무실 IP 사용자의 청구 흐름 진단 위해 `OfficeCanaryRequestInterceptor` 가 X-Canary=office 헤더 부착 (BOMAPP_CANARY_ENABLED=true 시). BV cutover 완료 후 X-Canary 라우팅의 본래 목적은 사라지고 평시엔 priority 10 만으로 처리하나, X-Canary=office 헤더 룰(priority 4)은 추후 재사용 대비로 ALB 에 유지(MR !43)."

