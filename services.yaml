# Overmind Service Catalog
# BOMAPP 마이크로서비스 메타데이터 정의 (보험 상품 도메인)
# Leader가 영향 분석 및 작업 계획 수립에 사용

services:
  # ─────────────────────────────────────────────
  # Shared Infrastructure
  # ─────────────────────────────────────────────
  - name: "infra"
    repo_url: "github.com/bomapp-inc/infra"
    path: "../infra"
    description: "BOMAPP AWS 인프라 IaC. Terraform으로 ECS 클러스터, RDS, ElastiCache, ALB, MSK 등을 관리하며 next-backend의 9개 ECS 서비스를 배포한다."
    tech_stack: ["terraform", "aws", "ecs", "rds", "elasticache", "alb", "msk"]
    critical_paths:
      - path: "terraform"
        description: "Terraform 모듈 및 환경별 설정 (dev/stg/prod)"
    dependencies: []
    test_command: "terraform validate"
    lint_command: "terraform fmt -check"
    notes:
      - "PROD 리소스는 prevent_destroy로 보호. destroy/replace 작업 절대 금지."
      - "변경 전 반드시 terraform state를 완전히 읽어 확인 후 plan/apply 수행."
      - "ECS 배포 대상 서비스: alimtalk-callback, bomapp-api, chat-api, mydata-api, open-api, bomapp-batch, mydata-batch, statics-batch, wings-api"

  # ─────────────────────────────────────────────
  # Next-Generation Backend Platform
  # ─────────────────────────────────────────────
  - name: "next-backend"
    repo_url: "github.com/bomapp-inc/next-backend"
    path: "../next-backend"
    description: "차세대 BOMAPP 백엔드 플랫폼. Gradle 멀티모듈로 5계층(core/internal/domain/external/server) 아키텍처를 구성하고, 9개 마이크로서비스 앱(API, 배치, 채팅, 마이데이터, 웹훅 등)을 단일 리포에서 빌드/배포한다. 보험 상품 조회/추천/판매의 핵심 도메인 로직 담당."
    tech_stack: ["java-21", "spring-boot-3.4", "spring-cloud-2024", "gradle-multi-module", "querydsl", "kafka-msk", "redisson", "jwt", "elastic-apm", "jib", "distroless"]
    critical_paths:
      - path: "bomapp-core/src/main/java"
        description: "공통 유틸리티 및 코어 라이브러리"
      - path: "bomapp-internal/src/main/java"
        description: "내부 프레임워크 (인증, 인가, 공통 인터셉터 등)"
      - path: "bomapp-domain/rds/src/main/java"
        description: "RDS 기반 도메인 모델 및 리포지토리"
      - path: "bomapp-domain/redis/src/main/java"
        description: "Redis 기반 도메인 모델 및 캐시"
      - path: "bomapp-external/src/main/java"
        description: "외부 시스템 연동 (14개 외부 클라이언트)"
      - path: "bomapp-server/bomapp-api"
        description: "메인 REST API 서버 (보험 상품 도메인)"
      - path: "bomapp-server/chat-api"
        description: "WebSocket 기반 상담 채팅 서버"
      - path: "bomapp-server/mydata-api"
        description: "마이데이터 통합 API (mydata-agent / bomapp_my_data 호출)"
      - path: "bomapp-server/mydata-batch"
        description: "마이데이터 일괄 수집 배치"
      - path: "bomapp-server/open-api"
        description: "외부 파트너 공개 API"
      - path: "bomapp-server/bomapp-batch"
        description: "BOMAPP 메인 배치"
      - path: "bomapp-server/statics-batch"
        description: "통계 집계 배치"
      - path: "bomapp-server/wings-api"
        description: "Wings(설계사 도구) API"
      - path: "bomapp-server/alimtalk-callback"
        description: "카카오 알림톡 콜백 웹훅 수신"
    dependencies:
      - service: "mydata-agent"
        type: "sync"
        interface: "rest"
        note: "mydata-api 가 외부 마이데이터 기관 통신을 위해 mydata-agent 게이트웨이를 호출"
      - service: "bomapp_my_data"
        type: "sync"
        interface: "rest"
        note: "(추정) 마이데이터 인증/동의 처리를 위해 bomapp_my_data 호출. 도메인 레이어에 레거시 인스턴스 정리 TODO 존재"
    test_command: "./gradlew test"
    lint_command: null
    notes:
      - "앱별 테스트 실행: ./gradlew :bomapp-server-{app}:test"
      - "환경별 프로파일 분리: local/dev/stg/prod. application-{profile}.yml 다중 사용."
      - "JUnit 5 사용 (useJUnitPlatform). checkstyle/ktlint 미설정."

  - name: "next-frontend"
    repo_url: "github.com/bomapp-inc/next-frontend"
    path: "../next-frontend"
    description: "차세대 BOMAPP 프론트엔드 모노레포. Yarn workspaces로 6개 웹/모바일/데스크톱/어드민 앱을 함께 관리하며 Vue 3 + Vite + Tailwind 스택 사용. next-backend의 API들을 axios/TanStack Query로 호출."
    tech_stack: ["typescript-5.8", "vue-3.5", "vite-7", "tailwind-3.4", "yarn-workspaces", "pinia", "tanstack-query", "sockjs-stomp", "sentry", "amplitude"]
    critical_paths:
      - path: "shared"
        description: "공유 컴포넌트, 유틸, 타입"
      - path: "bomapp-web/src"
        description: "BOMAPP 메인 웹 (보험 상품 검색/조회/가입)"
      - path: "open-web/src"
        description: "공개 파트너 웹"
      - path: "nextjs-bds-web/src"
        description: "BDS 웹 (브랜드 디자인 시스템 또는 비즈니스 데이터 서비스)"
      - path: "planner-mobile/src"
        description: "재정설계 모바일 앱"
      - path: "planner-desktop/src"
        description: "재정설계 데스크톱 앱"
      - path: "planner-admin/src"
        description: "재정설계 어드민"
    dependencies:
      - service: "next-backend"
        type: "sync"
        interface: "rest"
        note: "bomapp-api / mydata-api / open-api / chat-api 호출. 환경별 .env.{dev,stg,prod} 로 API URL 분기"
    test_command: null
    lint_command: null
    notes:
      - "package.json 에 test/lint 스크립트가 정의되어 있지 않다. 변경 시 빌드(`yarn build`)로만 1차 검증 가능."
      - "각 앱별 환경 파일은 .env.dev / .env.stg / .env.prod 패턴."

  # ─────────────────────────────────────────────
  # MyData Layer (마이데이터 연동)
  # ─────────────────────────────────────────────
  - name: "mydata-agent"
    repo_url: "github.com/bomapp-inc/mydata-agent"
    path: "../mydata-agent"
    description: "마이데이터 게이트웨이. 외부 마이데이터 기관과의 SSL 통신을 담당하며 next-backend의 mydata-api로부터 호출되어 보험 상품 데이터를 수집/조회한다. WebFlux 기반 비동기 처리."
    tech_stack: ["java-17", "spring-boot-3.0", "spring-webflux", "gradle"]
    critical_paths:
      - path: "src/main/java/kr/co/mydata_agent"
        description: "에이전트 애플리케이션 진입점 및 핵심 로직"
      - path: "src/main/java/kr/co/mydata_agent/gateway"
        description: "마이데이터 기관 통신 게이트웨이 (SSL 인증서 기반)"
      - path: "src/main/resources"
        description: "application.yml 및 SSL keystore 경로 설정"
    dependencies: []
    test_command: "./gradlew test"
    lint_command: null
    notes:
      - "포트: stg=8008. 기본/prod 포트는 application.yml 에서 환경별로 확인 필요."
      - "SSL 키스토어 (jks) 경로가 설정에 하드코딩되어 있어 배포 환경마다 차이 주의."
      - "단일 application.yml 에 모든 환경 프로파일이 포함되어 있다."

  - name: "bomapp_my_data"
    repo_url: "github.com/bomapp-inc/bomapp_my_data"
    path: "../bomapp_my_data"
    description: "(레거시) 마이데이터 인증/동의 관리 서비스. 사용자의 마이데이터 토큰 발급/갱신/폐기 및 동의 정보를 관리한다. 차세대 mydata-api 로 이관 중인 상태."
    tech_stack: ["java-11", "spring-boot-2.3", "spring-cloud-hoxton", "spring-cloud-openfeign", "jpa", "redis", "thymeleaf"]
    critical_paths:
      - path: "src/main/java/kr/co/bomapp/auth"
        description: "마이데이터 인증/토큰/동의 처리 로직"
      - path: "src/main/resources"
        description: "application.properties 환경별 설정 및 Thymeleaf 템플릿"
    dependencies: []
    test_command: "mvn test"
    lint_command: null
    notes:
      - "포트: develop/product=11000, staging=15000."
      - "Spring Boot 2.3 / Java 11 — EOL 임박. next-backend/mydata-api 로 단계적 이관 진행 중."
      - "OpenFeign 기반 다른 서비스 호출 단서 존재."

  # ─────────────────────────────────────────────
  # Standalone Security Component
  # ─────────────────────────────────────────────
  - name: "bomapp-vkey"
    repo_url: "github.com/bomapp-inc/transkey_servlet"
    path: "../transkey_servlet"
    description: "라온시큐어 TouchEn 가상키보드(transkey) 서버측 복호화 서블릿. 신용정보원 회원가입/비번재설정 주민번호, 연동(자동차·진료·건강검진·공인인증서) 인증서 비번 및 주민번호, 청구 주민번호, 마켓 카드번호 등 민감 정보 입력 플로우에서 클라이언트 가상키보드 페이로드를 복호화한다. `vkey.bomapp.co.kr` 도메인으로 노출. 벤더 1차 컨택: 장지수(라온 Technical Support Team II, jsjang@raoncorp.com, 2021 기록)."
    tech_stack: ["java-1.8", "jakarta-servlet-4.0", "tomcat-9.0.45", "war-packaging", "raonsecure-transkey-4.6", "raonsecure-transkey-decrypt-etoe-1.5"]
    critical_paths:
      - path: "web/WEB-INF/web.xml"
        description: "Raon TranskeyServlet 매핑 (`/transkeyServlet`) 및 전역 CORS 필터 정의"
      - path: "web/WEB-INF/raon_config/config.ini"
        description: "Raon 라이브러리 설정 (세션, 키보드 종류 경로, ExE2E_algorithm_bomapp 등). 운영 환경에는 zard21 의 절대경로 하드코딩이 남아 있어 주입/오버라이드 필요."
      - path: "web/WEB-INF/raon_config/transkey_license.ini"
        description: "라이선스 메타 (type, path). 실제 라이선스 파일은 `transkey__T_license/` (temporary) 와 `transkey__P_license/` (permanent) 하위에 위치. 리포 포함 라이선스는 `*.raonsecure.com` 도메인 데모용 — 운영용 라이선스 별도 주입 여부 미확인."
      - path: "web/WEB-INF/lib"
        description: "라온 라이브러리 jar 직접 포함 (`transkey-4-6-12_18_20190703_X.jar`, `TranskeyDecryptEtoE1.5_14.jar`). Maven 사용 안 함."
      - path: "web/TouchEn"
        description: "클라이언트 가상키보드 자산 (transkey.js / .css / 이미지, 데스크톱·모바일 별도)"
    dependencies: []
    test_command: null
    lint_command: null
    notes:
      - "**Maven/Gradle 빌드 시스템 없음.** IntelliJ artifact (`secure_servlet.iml`) 기반으로 WAR 산출. 노션 인프라 페이지의 \"바이너리 파일 통으로 가지고 있어서 실행만 하면 됨\" 설명과 일치."
      - "**현재 운영 형태**: PROD-BACK 공용 WAS 컨테이너 (`next-backend-was:1.1`, `i-03f0178089f760c6f` = 10.1.1.20 = api-was2) 내부 PID 1205, Tomcat 9.0.45, 컨테이너 디렉토리 `/was/run/bomapp-vkey`, listening 포트 8080. **호스트 마운트는 `/was/data/bomapp-vkey/vkey.tar` (126MB) + `restart.sh` 만 — 2023-04-04 이후 갱신 없음.**"
      - "**SPOF**: vkey 가 단일 인스턴스 `i-03f0178089f760c6f` 에서만 가동. PROD-BACK 의 두 번째 인스턴스 `i-09e36b30bad90990d` 에는 vkey 부재 (2026-05-19 SSM 확인). 새 ECS service 신설 시 desired_count ≥ 2 + multi-AZ 필수."
      - "**ALB 라우팅**: PROD-ALB:443 priority 10, host `vkey.bomapp.co.kr` → TG `prod-back-ecs-host-http-8080`. Tomcat 의 webapps 에 `ROOT/` 와 `secure_servlet/` 두 컨텍스트가 동일 WAR 로 deploy되어 있음 (`/transkeyServlet` 와 `/secure_servlet/transkeyServlet` 둘 다 응답)."
      - "**운영 라이선스 확정 (2026-05-19 SSM 추출)**: `transkey_license.ini` 의 `license.type=p` 활성. P 라이선스 X.509 Subject = `O=bomapp, CN=T=P&D=[*.bomapp.co.kr]`, 유효 2019-08-19 ~ **2049-08-11 (30년 영구)**, RaonSecure CA 발급. 인증서 체인 / 개인키 modulus 검증 통과. 와일드카드라 DEV/STG/PROD 도메인 모두 커버. 추출본은 `~/Downloads/bomapp-vkey-license-prod/P/` (권한 0600) — Spring Boot 부활 시 AWS Secrets Manager 로 이관."
      - "**T 라이선스 잔재**: `transkey__T_license/` 에 다른 회사(`O=HahaSavings`) 라이선스가 잘못 들어 있음. `license.type=p` 모드라 미사용이나 새 빌드 시 T 디렉토리 제외 권장."
      - "**관련 abandoned PoC**: [`github.com/bomapp-inc/transkey_springboot`](https://github.com/bomapp-inc/transkey_springboot) — 동일 개발자(zard21)가 2020-06-04 같은 날 만든 Spring Boot 포팅 시도. `kr.co.bomapp:securekey:0.0.1-SNAPSHOT`, `POST /securekey` REST endpoint 추가 시도. 초기 커밋 1개 후 작업 없음. 운영 배포 안 됨. 라온 jar 가 `javax.servlet` 기반이라 Spring Boot 3.x(jakarta) 불가 — 2.7.x 가 천장."
      - "**비표준 위치**: GitLab 셀프호스트(`gitlab.bomapp.co.kr`) 가 아닌 GitHub `bomapp-inc` 조직에 위치. BOMAPP 의 다른 서비스 호스팅 컨벤션 예외."
      - "이력: 2020-06-04 최초 작성 → 2024-02-20 \"PROD-ETC-API WAS로 통합\" 작업으로 별도 서버(10.10.10.51/52) → api-was2 통합 완료 → 2023-04-04 vkey.tar 마지막 갱신 (이후 frozen)."
      - "**테스트 명령 없음.** WAR 배포 후 `curl http://127.0.0.1:8080/` 응답에 `/TouchEn/transkey/transkey.js` 와 `/transkeyServlet/decode` form 포함 여부로 헬스 체크."

  # ─────────────────────────────────────────────
  # Legacy Monolith
  # ─────────────────────────────────────────────
  - name: "legacy-backend"
    repo_url: "github.com/bomapp-inc/legacy-backend"
    path: "../legacy-backend"
    description: "(레거시) 모놀리스 보험 상품 API/어드민/웹뷰 통합 시스템. Spring Boot 1.5 / Java 1.8 / WAR 패키징 기반. 차세대 next-backend 로 점진 이관 중이며 신규 기능 추가는 지양한다."
    tech_stack: ["java-1.8", "spring-boot-1.5", "maven", "war-packaging", "jedis", "elasticsearch-7.12"]
    critical_paths:
      - path: "bomapp_api_server/src/main/java"
        description: "레거시 API 서버 (포트 8080)"
      - path: "bomapp_redmin/src/main/java"
        description: "레거시 운영자 어드민"
      - path: "bomapp_webview_server/src/main/java"
        description: "앱 인앱 웹뷰 서버"
    dependencies: []
    test_command: "mvn test"
    lint_command: null
    notes:
      - "pom.xml 에서 maven.test.skip=true 로 테스트가 기본 비활성화되어 있다. 변경 시 명시적으로 -Dmaven.test.skip=false 사용."
      - "Java 1.8 / Spring Boot 1.5 로 EOL 상태. 보안 패치 및 의존성 업그레이드 시 충돌 주의."
      - "로컬 lib 디렉토리에 의존하는 jar 가 있으니 빌드 시 누락 확인."
