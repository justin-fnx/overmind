    description: "사내 모바일 앱 OTA Ad-hoc 배포 포털. 보맵(bomapp)/플래너(planner) × iOS/Android × dev/stg/prod 빌드를 한 페이지에서 다운로드/설치하도록 제공한다. `history.yaml` 릴리스 노트 + 번들 파일 목록으로 정적 `index.html` 과 iOS itms-services manifest(.plist) 를 Node 스크립트로 생성한다. `apps.bomapp.co.kr` 도메인으로 노출. App Store/Play Store 정식 배포가 아닌 내부 QA/테스트 배포용."
    tech_stack: ["node", "js-yaml", "static-site-generator", "bash", "rsync", "itms-services-ota", "yarn"]
    critical_paths:
      - path: "src/main.js"
        description: "정적 사이트 생성기. bundles/ 의 `<app>-<version>-<env>.<apk|ipa>` 파일명을 파싱해 history.yaml 노트와 결합, index.html 의 릴리스 표와 iOS .plist manifest 들을 생성한다. (파일명 substring/split 파싱 + 문자열 버전 정렬 — 취약)"
      - path: "src/manifest.plist"
        description: "iOS itms-services OTA 설치용 plist 템플릿 ({{ipaUrl}}/{{bundleId}}/{{version}}/{{appName}} 치환). display-image 가 bomapp 아이콘으로 하드코딩됨(planner 도 동일 — 버그)."
      - path: "src/index.html"
        description: "릴리스 표 템플릿 ({{bomappAosTrs}} 등 4개 플레이스홀더). bomapp/planner div 를 경로(location.pathname)로 분기 표시."
      - path: "deploy/download-bundles.sh"
        description: "prod-front EC2(`bomapp@prod-front.bomapp.co.kr:/was/run/apps-prod/archive/`)에서 모든 .apk/.ipa 번들을 로컬 bundles/ 로 rsync DOWN. (번들 source-of-truth 가 prod 서버 파일시스템)"
      - path: "deploy/deploy.sh"
        description: "clean+build 후 dist/ 를 동일 prod-front 서버 `/was/run/apps-prod` 로 rsync UP (--delete). 개발자 로컬 머신에서 수동 실행."
      - path: "deploy/env.sh"
        description: "배포 대상 호스트/포트/SSH 옵션. HOST=prod-front.bomapp.co.kr, PORT=2203, `~/next_bomapp.pem`, StrictHostKeyChecking=no (보안 스멜)."
      - path: "history.yaml"
        description: "앱/OS/버전별 릴리스 노트 단일 소스. 수기 관리."
    dependencies:
      - service: "infra"
        type: "async"
        interface: "hosting"
        note: "현재 apps.bomapp.co.kr 는 Route53 CNAME → prod-NLB → ALB rule_29 → prod-front EC2:3001(`/was/run/apps-prod`) 로 서빙. S3+CloudFront 이관 시 infra 의 s3_static_sites.tf/cloudfront_static_sites.tf/iam_deploy_static.tf/route53.tf 변경 필요."
      - service: "bomapp-ios"
        type: "async"
        interface: "package-registry + pipeline-trigger"
        note: "(이관 후) bomapp-ios CI 가 .ipa 를 GitLab generic registry(`bomapp/<ver>/bomapp-<ver>-<env>.ipa`)에 publish 하면 apps-distribution 파이프라인을 트리거하는 producer."
      - service: "bomapp-aos"
        type: "async"
        interface: "package-registry + pipeline-trigger"
        note: "(이관 후) bomapp-aos CI 가 .apk 를 GitLab generic registry(`bomapp/<ver>/bomapp-<ver>-<env>.apk`)에 publish 하면 apps-distribution 파이프라인을 트리거하는 producer. flavor stage→stg, product→prod 정규화."
      - service: "planner-ios"
        type: "async"
        interface: "package-registry + pipeline-trigger"
        note: "(이관 후) planner-ios CI 가 .ipa 를 GitLab generic registry(`planner/<ver>/planner-<ver>-<env>.ipa`)에 publish 하면 apps-distribution 파이프라인을 트리거하는 producer."
      - service: "planner-aos"
        type: "async"
        interface: "package-registry + pipeline-trigger"
        note: "(이관 후) planner-aos CI 가 .apk 를 GitLab generic registry(`planner/<ver>/planner-<ver>-<env>.apk`)에 publish 하면 apps-distribution 파이프라인을 트리거하는 producer."
    docs_to_read: []   # CLAUDE.md / AGENTS.md 모두 부재. 리포 자체 도메인 규칙 문서 없음 — Teammate 은 README 부재를 전제로 작업.
    test_command: null
    lint_command: null
    notes:
      - "**CI/CD 없음.** 전 과정이 개발자 로컬 머신 수동 실행: download-bundles.sh(번들 내려받기) → build.sh(dist 생성) → deploy.sh(rsync 업로드). GitLab 파이프라인 미구성."
      - "**번들 round-trip 비효율**: 모든 .apk/.ipa(대용량) 를 prod 서버에서 로컬로 내려받고 → dist/archive 로 복사 → 다시 prod 서버로 rsync 업로드. 배포마다 전체 바이너리가 랩탑을 왕복."
      - "**단일 PROD 사이트가 dev/stg/prod 빌드를 모두 호스팅**: next-frontend 처럼 환경별 버킷/배포로 갈리지 않음. 사이트 표 안에서 환경 컬럼(운영/스테이징/개발)으로 구분. 단일 main 브랜치."
      - "**번들 파일명 규약**: `<app>-<version>-<env>.<apk|ipa>` (예: `bomapp-4.2.9-prod.apk`, `planner-1.1.5-stg.ipa`). main.js 가 이 규약에 강결합."
      - "**manifest URL 하드코딩**: index.html/main.js/manifest.plist 안에 `https://apps.bomapp.co.kr/archive/...`, `/manifest/...`, `/img/...` 절대경로 하드코딩. 도메인/경로 구조 변경 시 동반 수정 필요."
      - "**보안**: env.sh 의 StrictHostKeyChecking=no, prod 직접 rsync(--delete) 권한, PEM 키 로컬 의존. S3+CF 이관 시 IAM deploy-static 키 기반으로 대체 가능."
      - "**iOS bundleId 규약**: bomapp=`kr.co.bomapp.iOSBomappBeta`(+`.staging`/`.dev`), planner=`kr.co.bomapp.planner`(+`.stg`/`.dev`). main.js getIosBundleId 에 하드코딩."
      - "**도메인 노출**: apps.bomapp.co.kr (HTTP 캐시 무효화 meta 사용). 이관 후엔 CloudFront no-cache(index/manifest) + immutable(아카이브) 분리 캐시 정책 권장."
      - "**알려진 버그**: manifest.plist 의 display-image/full-size-image 가 bomapp_57.png/bomapp_512.png 로 고정 — planner 앱 설치 시에도 보맵 아이콘 노출."
      - "**업스트림 producer (이관 후)**: bomapp-ios / bomapp-aos / planner-ios / planner-aos 4개 네이티브 앱 리포가 빌드 산출물을 GitLab generic registry 에 publish 하고 apps-distribution 파이프라인을 트리거한다. 번들 파일명 env 토큰은 dev/stg/prod 로 정규화(bomapp-ios `.staging`→stg, bomapp-aos `stage`→stg/`product`→prod)."

  # ─────────────────────────────────────────────
  # Native Mobile App Projects (앱 빌드 소스)
  # 보맵/플래너 × iOS/Android. 빌드 산출물(.ipa/.apk)을 GitLab Package
  # Registry 에 publish → apps-distribution OTA 포털 파이프라인 트리거.
  # 4개 모두 현재 CI 부재(개발자 로컬 수동 빌드) — GitLab CI 신설 대상.
  # ─────────────────────────────────────────────
  - name: "bomapp-ios"
    repo_url: "gitlab.bomapp.co.kr/bomapp/bomapp-ios"
    path: "../bomapp-ios"
    feature_base_branch: "main"
    description: "보맵(BOMAPP) iOS 네이티브 앱. Xcode 워크스페이스(CocoaPods) 기반, 메인 타깃 `Bomapp` + 푸시 확장 `NotificationService`. dev/stg/prod 3환경 scheme 으로 ad-hoc/App Store .ipa 산출. fastlane match 로 코드사이닝 인증서/프로파일 관리."
    tech_stack: ["swift", "xcode", "cocoapods", "fastlane-match", "rxswift", "moya", "amplitude", "braze", "ios-app"]
    critical_paths:
      - path: "Bomapp.xcworkspace"
        description: "CocoaPods 워크스페이스 진입점 (Bomapp + BDM + NotificationService)."
      - path: "Bomapp.xcodeproj/project.pbxproj"
        description: "타깃/빌드 컨피그(Development/Staging/Production Debug·Release), MARKETING_VERSION(현 4.2.x), CURRENT_PROJECT_VERSION."
      - path: "Bomapp/Resources/Config/{Development,Staging,Production}.xcconfig"
        description: "환경별 IS_APP_BUNDLE_ID — dev=`kr.co.bomapp.iOSBomappBeta.dev`, stg=`.staging`, prod=`kr.co.bomapp.iOSBomappBeta`. (포털 env 토큰: .staging→stg 정규화 필요)"
      - path: "Bomapp.xcodeproj/xcshareddata/xcschemes/Bomapp{Dev,Staging,Production}.xcscheme"
        description: "환경별 Archive scheme (ArchiveAction buildConfiguration = DevelopmentRelease/StagingRelease/ProductionRelease)."
      - path: "{Development,Staging,Appstore}ExportOptions.plist"
        description: "export 설정. dev/stg=ad-hoc(manual signing, OTA 가능), prod=app-store(OTA 불가 — 포털 prod OTA 용은 ad-hoc prod 빌드 별도 필요)."
      - path: "certs/, profiles/, match_version.txt"
        description: "fastlane match v2.111.0 인증서/프로비저닝 프로파일(리포 체크인). Apple Team R5RFEZ8DV2."
      - path: "BuildScript.sh"
        description: "Xcode Build Phase 빌드넘버 자동증가(YYYYMMDD.HHMM.count). 로컬 전용 — CI 에선 대체 로직 필요."
    dependencies:
      - service: "apps-distribution"
        type: "async"
        interface: "package-registry + pipeline-trigger"
        note: "CI 신설 후 .ipa 를 generic registry 에 publish → apps-distribution 트리거. 현재는 개발자 로컬 빌드 후 prod 서버로 수동 반영."
    docs_to_read: []   # CLAUDE.md/AGENTS.md 부재.
    test_command: null   # xcodebuild test 가능하나 CI 미구성.
    lint_command: null
    notes:
      - "**CI 부재.** .gitlab-ci.yml/.github/bitrise/Jenkins/codemagic 전무. iOS 빌드는 **macOS 러너 + Xcode** 필수가 핵심 과제."
      - "**코드사이닝**: manual + fastlane match(readonly). CI 에서 match git 저장소 접근 토큰 + 키체인 셋업 필요. dev/stg 는 ad-hoc, prod OTA 는 별도 ad-hoc export(`ProductionAdHocExportOptions.plist`) 신설 검토."
      - "**버전 소스**: project.pbxproj MARKETING_VERSION. 포털 파일명 `bomapp-<version>-<env>.ipa` 로 매핑."
      - "**bundle id**: `kr.co.bomapp.iOSBomappBeta`(+`.staging`/`.dev`). apps-distribution `getIosBundleId('bomapp', env)` 와 정확히 일치."

